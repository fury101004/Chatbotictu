name: Deploy backend to Azure App Service

on:
  workflow_dispatch:
    inputs:
      deploy_note:
        description: "Optional deployment note"
        required: false
        default: "Manual Azure App Service deployment"

env:
  PYTHON_VERSION: "3.11"
  AZURE_WEBAPP_PACKAGE_PATH: release.zip

jobs:
  test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate dependencies
        run: python -m pip check

      - name: Import FastAPI app
        run: python -c "import main; print(type(main.app).__name__); print(main.app.title)"

      - name: Run deploy smoke tests
        run: python -m pytest tests/test_chat_api_endpoints.py tests/test_runtime_config.py tests/test_rag_upload_flow.py

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment package
        run: |
          git archive --format zip --output "${AZURE_WEBAPP_PACKAGE_PATH}" HEAD

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
