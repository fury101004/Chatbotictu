services:
  bot:
    image: ${DOCKER_IMAGE:-ictu-rag-api:local}
    build: .
    container_name: ictu-rag-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
      - ./logs:/app/logs
      - ./views/frontend/templates:/app/views/frontend/templates
      - ./views/frontend/assets:/app/views/frontend/assets
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/home/data/hf-cache
      - HUGGINGFACE_HUB_CACHE=/home/data/hf-cache/hub
      - TRANSFORMERS_CACHE=/home/data/transformers
      - SENTENCE_TRANSFORMERS_HOME=/home/data/sentence-transformers
      - TORCH_HOME=/home/data/.cache/torch
      - XDG_CACHE_HOME=/home/data/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
