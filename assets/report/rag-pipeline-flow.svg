<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ICTU AI Agent Pipeline Flow</title>
  <desc id="desc">Step-by-step AI agent workflow for the ICTU chatbot from user request to retrieval, answer generation, and persistent history.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="stepA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="stepB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="stepC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #dbe6f0; stroke-width: 2; rx: 28; ry: 28; filter: url(#shadow); }
      .stephead { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .steptitle { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .note { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #92400e; }
      .cap { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #0f172a; letter-spacing: 1px; }
      .line { stroke: #475569; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #94a3b8; stroke-width: 3; stroke-dasharray: 8 10; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="36" width="1516" height="828" rx="32" ry="32" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="76" y="95" class="title">ICTU AI Agent Pipeline</text>
  <text x="76" y="130" class="subtitle">Report-ready sequence of the chatbot workflow from incoming question to retrieval, generation, fallback handling, and memory updates.</text>

  <rect x="84" y="180" width="220" height="170" class="panel"/>
  <rect x="84" y="180" width="220" height="46" rx="28" ry="28" fill="url(#stepA)"/>
  <text x="194" y="209" class="stephead" text-anchor="middle">STEP 1</text>
  <text x="112" y="258" class="steptitle">Receive Request</text>
  <text x="112" y="291" class="body">User sends a question from Web UI or API.</text>
  <text x="112" y="317" class="body">The system creates or reuses session context.</text>

  <rect x="348" y="180" width="220" height="170" class="panel"/>
  <rect x="348" y="180" width="220" height="46" rx="28" ry="28" fill="url(#stepB)"/>
  <text x="458" y="209" class="stephead" text-anchor="middle">STEP 2</text>
  <text x="376" y="258" class="steptitle">Normalize Input</text>
  <text x="376" y="291" class="body">Clean the message, validate fields,</text>
  <text x="376" y="315" class="body">attach session id, model choice,</text>
  <text x="376" y="339" class="body">and current language state.</text>

  <rect x="612" y="180" width="220" height="170" class="panel"/>
  <rect x="612" y="180" width="220" height="46" rx="28" ry="28" fill="url(#stepC)"/>
  <text x="722" y="209" class="stephead" text-anchor="middle">STEP 3</text>
  <text x="638" y="258" class="steptitle">Guardrail and Intent</text>
  <text x="638" y="291" class="body">Block unsafe content, answer quick</text>
  <text x="638" y="315" class="body">greetings, and decide whether the</text>
  <text x="638" y="339" class="body">full RAG flow is necessary.</text>

  <rect x="876" y="180" width="280" height="170" class="panel"/>
  <rect x="876" y="180" width="280" height="46" rx="28" ry="28" fill="url(#stepA)"/>
  <text x="1016" y="209" class="stephead" text-anchor="middle">STEP 4</text>
  <text x="904" y="258" class="steptitle">Route the Knowledge Tool</text>
  <text x="904" y="291" class="body">Choose handbook, school policy, FAQ,</text>
  <text x="904" y="315" class="body">fallback, or web-first retrieval path</text>
  <text x="904" y="339" class="body">based on the question intent.</text>

  <rect x="1200" y="180" width="312" height="170" class="panel"/>
  <rect x="1200" y="180" width="312" height="46" rx="28" ry="28" fill="url(#stepB)"/>
  <text x="1356" y="209" class="stephead" text-anchor="middle">STEP 5</text>
  <text x="1228" y="258" class="steptitle">Retrieve Context</text>
  <text x="1228" y="291" class="body">Combine vector search, BM25, lexical</text>
  <text x="1228" y="315" class="body">fallback, trusted web cache, and</text>
  <text x="1228" y="339" class="body">official ICTU web search when needed.</text>

  <rect x="358" y="462" width="432" height="216" class="panel"/>
  <rect x="358" y="462" width="432" height="46" rx="28" ry="28" fill="url(#stepC)"/>
  <text x="574" y="491" class="stephead" text-anchor="middle">STEP 6</text>
  <text x="388" y="544" class="steptitle">Generate the Final Answer</text>
  <text x="388" y="579" class="body">If context is strong, the LLM produces a grounded answer.</text>
  <text x="388" y="605" class="body">If the question is ambiguous, the agent asks one short follow-up.</text>
  <text x="388" y="631" class="body">If no reliable evidence exists, the system returns a safe fallback.</text>

  <rect x="856" y="462" width="432" height="216" class="panel"/>
  <rect x="856" y="462" width="432" height="46" rx="28" ry="28" fill="url(#stepA)"/>
  <text x="1072" y="491" class="stephead" text-anchor="middle">STEP 7</text>
  <text x="886" y="544" class="steptitle">Save History and Learning Signals</text>
  <text x="886" y="579" class="body">Store chat history in SQLite and keep retrieval metadata in memory.</text>
  <text x="886" y="605" class="body">Web-based answers can be cached into trusted knowledge for reuse.</text>
  <text x="886" y="631" class="body">Logs and metrics support demo, testing, and maintenance workflows.</text>

  <path d="M 304 265 C 322 265, 330 265, 348 265" class="line"/>
  <path d="M 568 265 C 586 265, 594 265, 612 265" class="line"/>
  <path d="M 832 265 C 850 265, 858 265, 876 265" class="line"/>
  <path d="M 1156 265 C 1174 265, 1182 265, 1200 265" class="line"/>
  <path d="M 1356 350 C 1356 405, 1072 405, 1072 462" class="line"/>
  <path d="M 856 570 C 830 570, 816 570, 790 570" class="line"/>

  <rect x="112" y="458" width="192" height="112" rx="20" ry="20" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="136" y="496" class="cap">FAST EXIT PATH</text>
  <text x="136" y="523" class="body">Greeting or unsafe input can stop here.</text>
  <text x="136" y="547" class="note">This reduces cost and response latency.</text>
  <path d="M 722 350 C 722 405, 208 405, 208 458" class="dashed"/>

  <rect x="1296" y="462" width="192" height="112" rx="20" ry="20" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="1320" y="496" class="cap">FOLLOW-UP LOGIC</text>
  <text x="1320" y="523" class="body">Ask for academic year, cohort,</text>
  <text x="1320" y="547" class="body">semester, or intake when unclear.</text>
  <path d="M 1356 350 C 1420 392, 1420 420, 1392 462" class="dashed"/>

  <text x="84" y="804" class="body">Suggested caption: End-to-end AI agent pipeline of the ICTU chatbot, highlighting guardrail logic, knowledge routing, hybrid retrieval, grounded generation, and persistent memory.</text>
</svg>
