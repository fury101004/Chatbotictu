<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ICTU AI Chatbot Architecture Overview</title>
  <desc id="desc">High-level architecture diagram for the ICTU AI Chatbot, showing user interaction, agent pipeline, retrieval layers, and operational components.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eef4f9"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="secondary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #dbe6f0; stroke-width: 2; filter: url(#shadow); }
      .pill { rx: 18; ry: 18; }
      .h1 { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .h2 { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .cap { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #0f172a; letter-spacing: 1px; }
      .line { stroke: #4b5563; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .softline { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .card { fill: #f8fbfd; stroke: #d8e4ea; stroke-width: 1.5; rx: 18; ry: 18; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="36" width="1516" height="828" rx="32" ry="32" fill="#ffffff" stroke="#dbe6f0" stroke-width="2"/>

  <text x="78" y="95" class="title">ICTU AI Chatbot: Architecture Overview</text>
  <text x="78" y="130" class="subtitle">FastAPI + RAG agent pipeline with hybrid retrieval, trusted web knowledge, and admin ingestion loop.</text>

  <rect x="82" y="170" width="190" height="80" rx="22" ry="22" fill="url(#primary)" filter="url(#shadow)"/>
  <text x="177" y="207" class="h1" text-anchor="middle">Users</text>
  <text x="177" y="230" class="small" text-anchor="middle" fill="#e6fffb">Students, staff, admin</text>

  <rect x="332" y="170" width="245" height="80" rx="22" ry="22" fill="url(#secondary)" filter="url(#shadow)"/>
  <text x="454" y="207" class="h1" text-anchor="middle">FastAPI Web / API Layer</text>
  <text x="454" y="230" class="small" text-anchor="middle" fill="#eff6ff">Controllers, views, request handling</text>

  <rect x="638" y="155" width="360" height="112" class="panel pill"/>
  <rect x="638" y="155" width="360" height="40" rx="22" ry="22" fill="url(#primary)"/>
  <text x="818" y="180" class="h1" text-anchor="middle">Agent Orchestration Layer</text>
  <text x="668" y="220" class="body">1. Normalize input and session state</text>
  <text x="668" y="244" class="body">2. Guardrail, quick reply, and intent routing</text>

  <rect x="1058" y="155" width="460" height="112" class="panel pill"/>
  <rect x="1058" y="155" width="460" height="40" rx="22" ry="22" fill="url(#secondary)"/>
  <text x="1288" y="180" class="h1" text-anchor="middle">Response Layer</text>
  <text x="1088" y="220" class="body">Prompt builder, LLM service, citation-aware answer generation</text>
  <text x="1088" y="244" class="body">Fallback reply, follow-up question, and response metadata</text>

  <rect x="568" y="324" width="540" height="422" class="panel pill"/>
  <rect x="568" y="324" width="540" height="42" rx="22" ry="22" fill="url(#accent)"/>
  <text x="838" y="350" class="h1" text-anchor="middle">Knowledge Retrieval Layer</text>
  <text x="594" y="390" class="cap">RAG ROUTER</text>
  <rect x="592" y="410" width="490" height="70" class="card"/>
  <text x="618" y="438" class="h2">Route By Knowledge Group</text>
  <text x="618" y="462" class="body">Student handbook, school policy, FAQ, fallback, or web-first queries.</text>

  <rect x="592" y="505" width="228" height="86" class="card"/>
  <text x="616" y="534" class="h2">Hybrid Retrieval</text>
  <text x="616" y="558" class="body">ChromaDB vector search</text>
  <text x="616" y="579" class="body">BM25 keyword retrieval</text>

  <rect x="852" y="505" width="230" height="86" class="card"/>
  <text x="876" y="534" class="h2">Fallback Retrieval</text>
  <text x="876" y="558" class="body">Lexical search on local corpus</text>
  <text x="876" y="579" class="body">No-info safe answer when needed</text>

  <rect x="592" y="615" width="228" height="96" class="card"/>
  <text x="616" y="644" class="h2">Trusted Web Knowledge</text>
  <text x="616" y="668" class="body">Official ICTU results cached</text>
  <text x="616" y="689" class="body">Reusable evidence for later queries</text>

  <rect x="852" y="615" width="230" height="96" class="card"/>
  <text x="876" y="644" class="h2">Realtime Web Search</text>
  <text x="876" y="668" class="body">Used for news, deadlines, current data</text>
  <text x="876" y="689" class="body">Official ICTU domains are prioritized</text>

  <rect x="1168" y="354" width="310" height="154" class="panel pill"/>
  <rect x="1168" y="354" width="310" height="40" rx="22" ry="22" fill="url(#primary)"/>
  <text x="1323" y="379" class="h1" text-anchor="middle">Memory and Observability</text>
  <text x="1194" y="419" class="body">Chat history in SQLite</text>
  <text x="1194" y="444" class="body">Session memory and retrieval metadata</text>
  <text x="1194" y="469" class="body">Logs, health checks, and reports</text>

  <rect x="1168" y="552" width="310" height="154" class="panel pill"/>
  <rect x="1168" y="552" width="310" height="40" rx="22" ry="22" fill="url(#secondary)"/>
  <text x="1323" y="577" class="h1" text-anchor="middle">Admin Knowledge Operations</text>
  <text x="1194" y="617" class="body">Upload raw files and approved Q&amp;A</text>
  <text x="1194" y="642" class="body">Chunk, embed, index, and reset vector store</text>
  <text x="1194" y="667" class="body">Vector manager for inspection and maintenance</text>

  <rect x="108" y="372" width="370" height="110" class="panel pill"/>
  <rect x="108" y="372" width="370" height="40" rx="22" ry="22" fill="url(#secondary)"/>
  <text x="293" y="397" class="h1" text-anchor="middle">Local Knowledge Sources</text>
  <text x="136" y="436" class="body">Clean documents, approved Q&amp;A, uploaded files</text>
  <text x="136" y="461" class="body">Chunk metadata: source, title, academic year, tool name</text>

  <rect x="108" y="540" width="370" height="110" class="panel pill"/>
  <rect x="108" y="540" width="370" height="40" rx="22" ry="22" fill="url(#accent)"/>
  <text x="293" y="565" class="h1" text-anchor="middle">Vector and Search Stores</text>
  <text x="136" y="604" class="body">ChromaDB persistent vector store</text>
  <text x="136" y="629" class="body">BM25 candidate pool and lexical backup search</text>

  <line x1="272" y1="210" x2="332" y2="210" class="line"/>
  <line x1="577" y1="210" x2="638" y2="210" class="line"/>
  <line x1="998" y1="210" x2="1058" y2="210" class="line"/>
  <line x1="818" y1="267" x2="818" y2="324" class="line"/>
  <line x1="1108" y1="535" x2="1168" y2="431" class="softline"/>
  <line x1="1108" y1="650" x2="1168" y2="629" class="softline"/>
  <line x1="478" y1="427" x2="568" y2="427" class="softline"/>
  <line x1="478" y1="595" x2="568" y2="595" class="softline"/>
  <line x1="1082" y1="548" x2="1168" y2="431" class="softline"/>
  <line x1="1082" y1="662" x2="1168" y2="628" class="softline"/>

  <text x="84" y="814" class="small">Suggested caption: High-level architecture of the ICTU AI Chatbot with agent orchestration, hybrid retrieval, trusted web knowledge, and admin operations.</text>
</svg>
